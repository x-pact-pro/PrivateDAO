name: privatedao-primary-host

services:
  read-node:
    build:
      context: ../..
      dockerfile: deploy/primary-host/read-node.Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "8787"
    volumes:
      - ./secrets:/srv/privatedao/deploy/primary-host/secrets:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/healthz').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  chain-watcher:
    build:
      context: ../..
      dockerfile: deploy/primary-host/read-node.Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    command: ["npm", "run", "start:chain-watcher"]
    volumes:
      - ./secrets:/srv/privatedao/deploy/primary-host/secrets:ro

  edge:
    image: caddy:2.10.2-alpine
    depends_on:
      read-node:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "${PRIMARY_LOCAL_HTTP_BIND_PORT:-8080}:8080"
      - "${PRIMARY_EDGE_HTTP_BIND_PORT:-8081}:80"
      - "${PRIMARY_EDGE_HTTPS_BIND_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./volumes/site:/srv/privatedao/site:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
