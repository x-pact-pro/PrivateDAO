name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22.21.1"

      - name: Install root dependencies
        run: npm install

      - name: Install web dependencies
        run: npm --prefix apps/web install

      - name: Build root web mirror bundle
        run: npm run web:bundle:root

      - name: Preserve custom domain
        run: echo "privatedao.org" > dist/web-mirror-root/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload root web artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist/web-mirror-root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
